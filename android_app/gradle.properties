# Enable AndroidX and Jetifier for library compatibility
android.useAndroidX=true
android.enableJetifier=true

# Increase heap size for smoother builds
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Avoid intermittent Kotlin daemon connection failures on some Windows setups.
kotlin.compiler.execution.strategy=in-process

# Keep Java 8 bytecode target without noisy JDK 21 source/target warning.
android.javaCompile.suppressSourceTargetDeprecationWarning=true
